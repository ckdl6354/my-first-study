<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>LockEye - 타이머</title>
  <style>
    /* 화면 정중앙 정렬 */
    body {
      background-color: #121212; /* 눈이 편한 다크 모드 배경 */
      color: #ffffff;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
/* 버튼 레이아웃 및 디자인 */
.control-box {
    margin-top: 20px;
    display: flex;
    justify-content: center;
}
.btn {
    padding: 10px 30px;
    font-size: 18px;
    font-weight: bold;
    color: #ffffff;
    background-color: #007bff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
}
.btn:hover {
    background-color: #0056b3;
}
    /* 초보자용 깔끔한 타이머 상자 디자인 */
    .timer-box {
      font-size: 80px;               /* 글자 크기 크게 */
      font-weight: bold;             /* 글자 두껍게 */
      font-family: monospace;        /* 숫자가 바뀌어도 가로폭 고정 */
      padding: 30px 60px;            /* 안쪽 여백 */
      border-radius: 20px;           /* 모서리 둥글게 */
      background-color: #222222;     /* 진한 회색 상자 */
      box-shadow: 0 4px 20px rgba(0,0,0,0.5); /* 은은한 그림자 효과 */
      text-align: center;
    }
<div class="control-box">
    <button id="startPauseBtn" class="btn">시작</button>
</div>
</style>
</head>
<body>
  <!-- 타이머 화면 표시 -->
  <div id="timer" class="timer-box">25:00</div>
  <script>
    let time = 25 * 60; 
let timerInterval = null; // 타이머 제어용 변수
const timerDisplay = document.getElementById('timer');
const startPauseBtn = document.getElementById('startPauseBtn');
// 화면에 시간을 그려주는 함수
function updateDisplay() {
    let min = String(Math.floor(time / 60)).padStart(2, '0');
    let sec = String(time % 60).padStart(2, '0');
    timerDisplay.textContent = `${min}:${sec}`;
}
// 버튼 클릭 이벤트
startPauseBtn.addEventListener('click', () => {
    if (timerInterval === null) {
        // 타이머 시작
        timerInterval = setInterval(() => {
            if (time > 0) {
                time--;
                updateDisplay();
            } else {
                clearInterval(timerInterval);
                timerInterval = null;
                startPauseBtn.textContent = '시작';
            }
        }, 1000);
        startPauseBtn.textContent = '일시정지';
    } else {
        // 타이머 일시정지
        clearInterval(timerInterval);
        timerInterval = null;
        startPauseBtn.textContent = '시작';
    }
});
  </script>

</body>
</html>
